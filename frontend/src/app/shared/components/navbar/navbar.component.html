<nav class="sticky top-0 z-40 border-b border-black/10 bg-ink text-white backdrop-blur">
  <div class="mx-auto flex w-full max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
    <a routerLink="/products" class="inline-flex items-center gap-3">
      <span class="grid h-9 w-9 place-items-center rounded-xl bg-brand text-ink font-black">G</span>
      <span class="font-semibold tracking-wide">GymLite</span>
    </a>

    <ng-container *ngIf="authState$ | async as authState; else guestActions">
      <div class="flex items-center gap-3" *ngIf="authState.authenticated; else guestActions">
        <a
          routerLink="/products"
          routerLinkActive="is-active"
          class="nav-link"
          >Products</a
        >
        <a routerLink="/orders" routerLinkActive="is-active" class="nav-link">Orders</a>
        <a routerLink="/profile" routerLinkActive="is-active" class="nav-link">Profile</a>
        <a
          *ngIf="isAdmin()"
          routerLink="/admin/products"
          routerLinkActive="is-active"
          class="nav-link"
          >Admin</a
        >

        <button type="button" class="cart-btn" (click)="openCart()" aria-label="Open cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="h-6 w-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h1.6a1 1 0 0 1 1 .8l.3 1.6m0 0h14.5a1 1 0 0 1 1 .8l-1.2 6.4a1 1 0 0 1-1 .8H8.2m-1.3-8.8 1.2 6.2m0 0a2 2 0 1 0 2 2h7.8a2 2 0 1 0 2-2H8.1z" />
          </svg>
          <span class="cart-badge" *ngIf="(itemCount$ | async) as itemCount">{{ itemCount }}</span>
        </button>

        <button type="button" class="btn-secondary !border-white/35 !bg-transparent !text-white" (click)="logout()">
          Logout
        </button>
      </div>
    </ng-container>

    <ng-template #guestActions>
      <div class="flex items-center gap-3">
        <button type="button" class="btn-secondary !border-white/35 !bg-transparent !text-white" (click)="login()">
          Login
        </button>
        <button type="button" class="btn-primary" (click)="register()">Register</button>
      </div>
    </ng-template>
  </div>
</nav>
