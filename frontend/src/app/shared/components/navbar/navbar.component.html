<header class="sticky top-0 z-50 border-b border-white/5 bg-surface/80 backdrop-blur-lg">
  <div class="container-app flex h-16 items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-2 text-xl font-black tracking-tight text-ink">
      <i class="fa-solid fa-dumbbell text-brand"></i>GymLite
    </a>

    <!-- Desktop nav -->
    <nav class="hidden md:flex items-center gap-6 text-sm font-medium">
      <a routerLink="/products" routerLinkActive="text-brand" class="text-ink-muted hover:text-ink transition">Shop</a>
      <ng-container *ngIf="authState$ | async as s">
        <ng-container *ngIf="s.authenticated && isAdmin()">
          <a routerLink="/admin/products" routerLinkActive="text-brand" class="text-ink-muted hover:text-ink transition">Admin</a>
        </ng-container>
      </ng-container>
    </nav>

    <!-- Desktop actions -->
    <div class="hidden md:flex items-center gap-3">
      <a routerLink="/cart" class="btn-ghost btn-sm relative">
        <i class="fa-solid fa-cart-shopping"></i>
        <span *ngIf="(itemCount$ | async) as c" class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-brand text-[10px] font-bold text-white">{{ c }}</span>
      </a>
      <ng-container *ngIf="authState$ | async as s">
        <ng-container *ngIf="s.authenticated; else loggedOut">
          <span class="text-sm text-ink-muted">{{ s.user?.firstName }}</span>
          <button (click)="logout()" class="btn-secondary btn-sm">Logout</button>
        </ng-container>
        <ng-template #loggedOut>
          <a routerLink="/login" class="btn-secondary btn-sm">Sign In</a>
          <a routerLink="/register" class="btn-primary btn-sm">Sign Up</a>
        </ng-template>
      </ng-container>
    </div>

    <!-- Mobile hamburger -->
    <button (click)="toggleMobile()" class="md:hidden btn-ghost btn-sm">
      <i class="fa-solid" [ngClass]="mobileOpen ? 'fa-xmark' : 'fa-bars'"></i>
    </button>
  </div>

  <!-- Mobile menu -->
  <div *ngIf="mobileOpen" class="md:hidden border-t border-white/5 bg-surface px-4 pb-4 pt-2 space-y-2">
    <a routerLink="/products" (click)="mobileOpen=false" class="block py-2 text-sm text-ink-muted hover:text-ink">Shop</a>
    <a routerLink="/cart" (click)="mobileOpen=false" class="block py-2 text-sm text-ink-muted hover:text-ink">
      <i class="fa-solid fa-cart-shopping mr-2"></i>Cart
      <span *ngIf="(itemCount$ | async) as c" class="badge-brand ml-1">{{ c }}</span>
    </a>
    <ng-container *ngIf="authState$ | async as s">
      <ng-container *ngIf="s.authenticated && isAdmin()">
        <a routerLink="/admin/products" (click)="mobileOpen=false" class="block py-2 text-sm text-ink-muted hover:text-ink">Admin</a>
      </ng-container>
      <ng-container *ngIf="s.authenticated; else mobileLoggedOut">
        <button (click)="logout(); mobileOpen=false" class="btn-secondary btn-sm w-full mt-2">Logout</button>
      </ng-container>
      <ng-template #mobileLoggedOut>
        <div class="flex gap-2 mt-2">
          <a routerLink="/login" (click)="mobileOpen=false" class="btn-secondary btn-sm flex-1 text-center">Sign In</a>
          <a routerLink="/register" (click)="mobileOpen=false" class="btn-primary btn-sm flex-1 text-center">Sign Up</a>
        </div>
      </ng-template>
    </ng-container>
  </div>
</header>
