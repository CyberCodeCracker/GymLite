<!-- Scroll to top -->
<button *ngIf="showScroll" (click)="scrollToTop()"
  class="fixed bottom-24 right-8 z-40 flex h-10 w-10 items-center justify-center rounded-full bg-surface-light text-ink-muted shadow-lg hover:text-ink transition-all active:scale-90 animate-slide-up"
  style="border: 1px solid var(--border)">
  <i class="fa-solid fa-arrow-up text-sm"></i>
</button>

<!-- Cart button -->
<div class="fixed bottom-6 right-6 z-50" *ngIf="(itemCount$ | async) as count">
  <button (click)="toggle()"
    class="relative flex h-14 w-14 items-center justify-center rounded-full bg-brand text-white shadow-lg shadow-brand/30 hover:bg-brand-dark transition-all active:scale-90">
    <i class="fa-solid fa-cart-shopping text-lg"></i>
  </button>
  <span class="absolute -top-1 -right-1 flex h-5 w-5 items-center justify-center rounded-full bg-white text-brand text-[11px] font-bold pointer-events-none">{{ count }}</span>
</div>

<!-- Overlay -->
<div *ngIf="open" (click)="close()" class="fixed inset-0 z-50" style="background: var(--overlay)"></div>

<!-- Cart popup -->
<div *ngIf="open" class="fixed bottom-24 right-6 z-50 w-80 max-h-[70vh] rounded-xl shadow-2xl overflow-hidden flex flex-col animate-slide-up"
  style="background: var(--surface); border: 1px solid var(--border)">
  <div class="flex items-center justify-between px-4 py-3" style="border-bottom: 1px solid var(--border)">
    <h3 class="text-sm font-bold text-ink"><i class="fa-solid fa-cart-shopping text-brand mr-2"></i>Your Cart</h3>
    <button (click)="close()" class="text-ink-faint hover:text-ink transition text-xs"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="flex-1 overflow-y-auto px-4 py-2 space-y-3">
    <div *ngFor="let item of cart$ | async" class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg flex-shrink-0 overflow-hidden flex items-center justify-center" style="background: var(--surface-lighter)">
        <img *ngIf="item.imageUrl" [src]="item.imageUrl" class="w-full h-full object-cover" />
        <i *ngIf="!item.imageUrl" class="fa-solid fa-dumbbell text-xs text-ink-faint"></i>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-ink truncate">{{ item.name }}</p>
        <div class="flex items-center gap-2 mt-1">
          <div class="flex items-center rounded text-xs" style="border: 1px solid var(--border-input)">
            <button (click)="updateQty(item.productId, item.quantity - 1)" class="px-1.5 py-0.5 text-ink-muted hover:text-ink">
              <i class="fa-solid fa-minus" style="font-size:8px"></i>
            </button>
            <span class="px-1.5 text-ink">{{ item.quantity }}</span>
            <button (click)="updateQty(item.productId, item.quantity + 1)" class="px-1.5 py-0.5 text-ink-muted hover:text-ink">
              <i class="fa-solid fa-plus" style="font-size:8px"></i>
            </button>
          </div>
          <span class="text-xs font-semibold text-brand">{{ item.price * item.quantity | currency }}</span>
        </div>
      </div>
      <button (click)="remove(item.productId, item.name)" class="text-ink-faint hover:text-red-400 transition text-xs">
        <i class="fa-solid fa-trash-can"></i>
      </button>
    </div>
  </div>
  <div class="px-4 py-3" style="border-top: 1px solid var(--border)">
    <div class="flex justify-between text-sm font-bold mb-3">
      <span class="text-ink">Total</span>
      <span class="text-brand">{{ total$ | async | currency }}</span>
    </div>
    <a routerLink="/cart" (click)="close()" class="btn-primary btn-sm w-full text-center">
      View Cart <i class="fa-solid fa-arrow-right ml-1"></i>
    </a>
  </div>
</div>
