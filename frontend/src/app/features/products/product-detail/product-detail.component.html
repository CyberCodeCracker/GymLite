<section class="container-app py-8" *ngIf="product as p">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12">
    <!-- Images -->
    <div>
      <div class="aspect-square rounded-xl bg-surface-lighter overflow-hidden flex items-center justify-center mb-3">
        <img *ngIf="p.imageUrls?.length" [src]="p.imageUrls[selectedImage]" [alt]="p.name" class="w-full h-full object-cover" />
        <i *ngIf="!p.imageUrls?.length" class="fa-solid fa-dumbbell text-6xl text-ink-faint"></i>
      </div>
      <div *ngIf="p.imageUrls && p.imageUrls.length > 1" class="flex gap-2">
        <button *ngFor="let img of p.imageUrls; let i = index" (click)="selectedImage = i"
          class="w-16 h-16 rounded-lg overflow-hidden border-2 transition"
          [ngClass]="i === selectedImage ? 'border-brand' : 'border-white/10 hover:border-white/20'">
          <img [src]="img" class="w-full h-full object-cover" />
        </button>
      </div>
    </div>

    <!-- Info -->
    <div class="flex flex-col">
      <span class="badge-brand mb-3 self-start">{{ p.categoryName }}</span>
      <h1 class="text-3xl font-black text-ink">{{ p.name }}</h1>
      <p class="text-3xl font-black text-brand mt-3">{{ p.price | currency }}</p>
      <p class="text-sm text-ink-muted mt-4 leading-relaxed">{{ p.description }}</p>

      <div class="flex items-center gap-2 mt-4">
        <span class="text-sm" [ngClass]="p.availableQuantity > 0 ? 'text-green-400' : 'text-red-400'">
          <i class="fa-solid" [ngClass]="p.availableQuantity > 0 ? 'fa-circle-check' : 'fa-circle-xmark'"></i>
          {{ p.availableQuantity > 0 ? p.availableQuantity + ' in stock' : 'Out of stock' }}
        </span>
      </div>

      <div class="flex items-center gap-3 mt-8">
        <div class="flex items-center border border-white/10 rounded-lg">
          <button (click)="qty = qty > 1 ? qty - 1 : 1" class="px-3 py-2 text-ink-muted hover:text-ink transition">
            <i class="fa-solid fa-minus text-xs"></i>
          </button>
          <input type="number" [(ngModel)]="qty" min="1" [max]="p.availableQuantity" class="w-12 text-center bg-transparent text-ink text-sm border-x border-white/10 py-2 outline-none" />
          <button (click)="qty = qty + 1" class="px-3 py-2 text-ink-muted hover:text-ink transition">
            <i class="fa-solid fa-plus text-xs"></i>
          </button>
        </div>
        <button (click)="addToCart()" [disabled]="p.availableQuantity <= 0" class="btn-primary flex-1">
          <i class="fa-solid fa-cart-plus"></i> Add to Cart
        </button>
      </div>
    </div>
  </div>
</section>

<!-- Loading -->
<div *ngIf="loading" class="container-app py-8">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <div class="skeleton aspect-square rounded-xl"></div>
    <div class="space-y-4 py-4">
      <div class="skeleton h-4 w-24"></div>
      <div class="skeleton h-8 w-3/4"></div>
      <div class="skeleton h-8 w-32"></div>
      <div class="skeleton h-20 w-full mt-4"></div>
    </div>
  </div>
</div>
