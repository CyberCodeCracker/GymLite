<section class="container-app py-8">
  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-3xl font-black text-ink">Shop Equipment</h1>
    <p class="text-sm text-ink-muted mt-1">{{ filtered.length }} products available</p>
  </div>

  <!-- Filter bar -->
  <div class="flex flex-col sm:flex-row gap-3 mb-8">
    <div class="relative flex-1">
      <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-ink-faint text-sm z-10"></i>
      <input type="text" [(ngModel)]="search" (ngModelChange)="page=1" placeholder="Search products..." class="input !pl-8" />
    </div>
    <select [(ngModel)]="selectedCategory" (ngModelChange)="page=1" class="input w-full sm:w-48">
      <option [ngValue]="0">All Categories</option>
      <option *ngFor="let c of categories" [ngValue]="c.id">{{ c.name }}</option>
    </select>
    <select [(ngModel)]="sortBy" class="input w-full sm:w-44">
      <option value="name">Sort: Name</option>
      <option value="price-asc">Price: Low-High</option>
      <option value="price-desc">Price: High-Low</option>
    </select>
    <button *ngIf="search || selectedCategory || sortBy !== 'name'" (click)="resetFilters()" class="btn-ghost btn-sm whitespace-nowrap">
      <i class="fa-solid fa-xmark"></i> Clear
    </button>
  </div>

  <!-- Loading skeleton -->
  <div *ngIf="loading" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
    <div *ngFor="let s of [1,2,3,4,5,6,7,8]" class="card">
      <div class="skeleton aspect-square rounded-lg mb-4"></div>
      <div class="skeleton h-3 w-20 mb-2"></div>
      <div class="skeleton h-4 w-3/4 mb-2"></div>
      <div class="skeleton h-4 w-16"></div>
    </div>
  </div>

  <!-- Product grid -->
  <div *ngIf="!loading && paged.length" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
    <div *ngFor="let p of paged" class="card-hover group flex flex-col">
      <a [routerLink]="['/products', p.id]" class="block">
        <div class="aspect-square rounded-lg bg-surface-lighter mb-4 overflow-hidden flex items-center justify-center">
          <img *ngIf="p.imageUrls?.length" [src]="p.imageUrls[0]" [alt]="p.name" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
          <i *ngIf="!p.imageUrls?.length" class="fa-solid fa-dumbbell text-4xl text-ink-faint"></i>
        </div>
      </a>
      <p class="text-xs text-ink-faint uppercase tracking-wide">{{ p.categoryName }}</p>
      <a [routerLink]="['/products', p.id]" class="text-sm font-semibold text-ink mt-1 truncate hover:text-brand transition">{{ p.name }}</a>
      <div class="flex items-center justify-between mt-auto pt-3">
        <span class="text-brand font-bold">{{ p.price | currency }}</span>
        <button (click)="addToCart(p)" class="btn-primary btn-sm">
          <i class="fa-solid fa-cart-plus"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading && !paged.length" class="text-center py-20">
    <i class="fa-solid fa-box-open text-5xl text-ink-faint mb-4"></i>
    <p class="text-ink-muted">No products found</p>
    <button (click)="resetFilters()" class="btn-secondary btn-sm mt-4">Clear Filters</button>
  </div>

  <app-pagination [currentPage]="page" [totalItems]="filtered.length" [pageSize]="pageSize" (pageChange)="onPageChange($event)"></app-pagination>
</section>
