<section class="grid gap-6 lg:grid-cols-[1.4fr_1fr]">
  <article class="app-panel p-5">
    <h1 class="m-0 text-3xl font-black">Checkout</h1>
    <p class="mt-2 text-black/65">Confirm your details and place your order.</p>

    <form class="mt-5 space-y-4" [formGroup]="checkoutForm" (ngSubmit)="placeOrder()">
      <div class="grid gap-4 sm:grid-cols-2">
        <label>
          <span class="field-label">First name</span>
          <input class="text-field" formControlName="firstName" />
        </label>
        <label>
          <span class="field-label">Last name</span>
          <input class="text-field" formControlName="lastName" />
        </label>
      </div>

      <label>
        <span class="field-label">Email</span>
        <input class="text-field" formControlName="email" />
      </label>

      <div class="grid gap-4 sm:grid-cols-2">
        <label>
          <span class="field-label">Street</span>
          <input class="text-field" formControlName="street" />
        </label>
        <label>
          <span class="field-label">City</span>
          <input class="text-field" formControlName="city" />
        </label>
      </div>

      <div class="grid gap-4 sm:grid-cols-2">
        <label>
          <span class="field-label">House number</span>
          <input class="text-field" formControlName="houseNumber" />
        </label>
        <label>
          <span class="field-label">Zip code</span>
          <input class="text-field" formControlName="zipCode" />
        </label>
      </div>

      <label>
        <span class="field-label">Payment method</span>
        <select class="text-field" formControlName="paymentMethod">
          <option *ngFor="let method of paymentMethods" [ngValue]="method">{{ method }}</option>
        </select>
      </label>

      <p class="rounded-xl bg-red-100 px-3 py-2 text-sm font-semibold text-red-700" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <div class="flex flex-wrap gap-3">
        <button type="submit" class="btn-primary" [disabled]="submitting || items.length === 0">
          {{ submitting ? 'Processing...' : 'Place Order' }}
        </button>
        <button type="button" class="btn-secondary" (click)="continueShopping()">Continue Shopping</button>
      </div>
    </form>
  </article>

  <aside class="app-panel p-5">
    <h2 class="m-0 text-xl font-black">Order Summary</h2>
    <div class="mt-4 space-y-3" *ngIf="items.length > 0; else emptyCart">
      <article *ngFor="let item of items" class="rounded-xl border border-black/10 bg-white p-3">
        <div class="flex items-start justify-between gap-2">
          <h3 class="m-0 text-sm font-semibold">{{ item.product.name }}</h3>
          <span class="text-sm font-bold">{{ item.product.price * item.quantity | currency }}</span>
        </div>
        <p class="m-0 mt-1 text-xs text-black/60">Qty: {{ item.quantity }}</p>
      </article>

      <div class="border-t border-black/10 pt-3 text-sm font-semibold">
        <div class="flex items-center justify-between">
          <span>Total</span>
          <span>{{ totalAmount | currency }}</span>
        </div>
      </div>
    </div>

    <ng-template #emptyCart>
      <p class="rounded-xl border border-dashed border-black/20 p-3 text-sm text-black/60">No items in cart.</p>
    </ng-template>

    <div class="mt-4 rounded-xl bg-green-100 px-3 py-2 text-sm font-semibold text-green-800" *ngIf="orderId !== null">
      Order created successfully with ID: {{ orderId }}.
    </div>
  </aside>
</section>
