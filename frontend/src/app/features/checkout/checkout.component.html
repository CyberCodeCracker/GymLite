<section class="container-app py-8">
  <a routerLink="/cart" class="inline-flex items-center gap-1 text-sm text-ink-muted hover:text-ink transition mb-6">
    <i class="fa-solid fa-arrow-left"></i> Back to cart
  </a>
  <h1 class="text-3xl font-black text-ink mb-8">Checkout</h1>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <!-- Payment method -->
    <div class="card">
      <h2 class="text-lg font-bold text-ink mb-4">Payment Method</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <button *ngFor="let m of paymentMethods" (click)="paymentMethod = m"
          class="flex items-center gap-3 rounded-lg border p-4 transition text-left"
          [ngClass]="paymentMethod === m ? 'border-brand bg-brand/10' : 'border-white/10 hover:border-white/20'">
          <i class="fa-solid text-lg" [ngClass]="{
            'fa-cc-visa text-blue-400': m === 'VISA',
            'fa-cc-mastercard text-orange-400': m === 'MASTER_CARD',
            'fa-paypal text-blue-300': m === 'PAYPAL',
            'fa-credit-card text-ink-muted': m === 'CREDIT_CARD',
            'fa-bitcoin-sign text-yellow-400': m === 'BITCOIN'
          }"></i>
          <span class="text-sm font-medium text-ink">{{ formatMethod(m) }}</span>
        </button>
      </div>
    </div>

    <!-- Order summary -->
    <div class="card h-fit">
      <h2 class="text-lg font-bold text-ink mb-4">Order Summary</h2>
      <div *ngFor="let item of cart$ | async" class="flex justify-between text-sm py-2 border-b border-white/5">
        <span class="text-ink-muted truncate mr-4">{{ item.name }} x{{ item.quantity }}</span>
        <span class="text-ink font-medium whitespace-nowrap">{{ item.price * item.quantity | currency }}</span>
      </div>
      <div class="flex justify-between text-ink font-bold text-base mt-4">
        <span>Total</span>
        <span class="text-brand">{{ total$ | async | currency }}</span>
      </div>
      <button (click)="placeOrder()" [disabled]="loading" class="btn-primary w-full mt-6">
        <i *ngIf="loading" class="fa-solid fa-spinner fa-spin"></i>
        {{ loading ? 'Processing...' : 'Place Order' }}
      </button>
    </div>
  </div>
</section>
