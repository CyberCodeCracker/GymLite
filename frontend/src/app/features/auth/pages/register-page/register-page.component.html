<section class="grid min-h-[70vh] place-items-center">
  <div class="auth-card app-panel w-full max-w-xl p-6 sm:p-8">
    <p class="mb-2 inline-block rounded-full bg-brand/20 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-ink">
      Get Started
    </p>
    <h1 class="m-0 text-4xl font-black leading-tight">Create your GymLite account</h1>
    <p class="mt-3 text-black/70">
      Fill in your details to create a new account.
    </p>

    <div *ngIf="errorMessage" class="mt-4 rounded-lg bg-red-50 border border-red-200 p-3 text-sm text-red-700">
      {{ errorMessage }}
    </div>

    <div class="mt-6 flex flex-col gap-4">
      <div class="flex gap-4">
        <div class="flex-1">
          <label for="firstName" class="mb-1 block text-sm font-medium text-black/80">First Name</label>
          <input
            id="firstName"
            type="text"
            [(ngModel)]="firstName"
            placeholder="John"
            class="w-full rounded-lg border border-black/20 px-4 py-2.5 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand"
          />
        </div>
        <div class="flex-1">
          <label for="lastName" class="mb-1 block text-sm font-medium text-black/80">Last Name</label>
          <input
            id="lastName"
            type="text"
            [(ngModel)]="lastName"
            placeholder="Doe"
            class="w-full rounded-lg border border-black/20 px-4 py-2.5 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand"
          />
        </div>
      </div>
      <div>
        <label for="email" class="mb-1 block text-sm font-medium text-black/80">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          class="w-full rounded-lg border border-black/20 px-4 py-2.5 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand"
        />
      </div>
      <div>
        <label for="password" class="mb-1 block text-sm font-medium text-black/80">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          placeholder="Min. 8 characters"
          class="w-full rounded-lg border border-black/20 px-4 py-2.5 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand"
        />
      </div>
      <div>
        <label for="passwordConfirm" class="mb-1 block text-sm font-medium text-black/80">Confirm Password</label>
        <input
          id="passwordConfirm"
          type="password"
          [(ngModel)]="passwordConfirm"
          placeholder="Repeat your password"
          class="w-full rounded-lg border border-black/20 px-4 py-2.5 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand"
        />
      </div>
    </div>

    <div class="mt-6 flex flex-wrap gap-3">
      <button
        type="button"
        class="btn-primary"
        [disabled]="loading || !firstName || !lastName || !email || !password || !passwordConfirm"
        (click)="register()"
      >
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
      <button type="button" class="btn-secondary" (click)="backToLogin()">Back To Login</button>
    </div>
  </div>
</section>
