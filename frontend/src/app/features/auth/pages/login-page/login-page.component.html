<section class="grid min-h-[70vh] place-items-center">
  <div class="auth-card app-panel w-full max-w-xl p-6 sm:p-8">
    <p class="mb-2 inline-block rounded-full bg-brand/20 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-ink">
      Welcome Back
    </p>
    <h1 class="m-0 text-4xl font-black leading-tight">Sign in to GymLite</h1>
    <p class="mt-3 text-black/70">
      Enter your credentials to access your account.
    </p>

    <div *ngIf="errorMessage" class="mt-4 rounded-lg bg-red-50 border border-red-200 p-3 text-sm text-red-700">
      {{ errorMessage }}
    </div>

    <div class="mt-6 flex flex-col gap-4">
      <div>
        <label for="email" class="mb-1 block text-sm font-medium text-black/80">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          class="w-full rounded-lg border border-black/20 px-4 py-2.5 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand"
        />
      </div>
      <div>
        <label for="password" class="mb-1 block text-sm font-medium text-black/80">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          placeholder="Enter your password"
          class="w-full rounded-lg border border-black/20 px-4 py-2.5 text-sm focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand"
        />
      </div>
    </div>

    <div class="mt-6 flex flex-wrap gap-3">
      <button
        type="button"
        class="btn-primary"
        [disabled]="loading || !email || !password"
        (click)="login()"
      >
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
      <button type="button" class="btn-secondary" (click)="goToRegister()">Create Account</button>
    </div>
  </div>
</section>
