<section class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="card w-full max-w-md p-8">
    <div class="text-center mb-6">
      <i class="fa-solid fa-dumbbell text-brand text-3xl mb-3"></i>
      <h1 class="text-2xl font-black text-ink">Join GymLite</h1>
      <p class="text-sm text-ink-muted mt-1">Step {{ step }} of 2</p>
    </div>

    <!-- Progress bar -->
    <div class="flex gap-2 mb-6">
      <div class="h-1 flex-1 rounded-full" [ngClass]="step >= 1 ? 'bg-brand' : 'bg-white/10'"></div>
      <div class="h-1 flex-1 rounded-full" [ngClass]="step >= 2 ? 'bg-brand' : 'bg-white/10'"></div>
    </div>

    <!-- Step 1 -->
    <div *ngIf="step === 1" class="space-y-4">
      <div class="flex gap-3">
        <div class="flex-1">
          <label class="label">First Name</label>
          <input type="text" [(ngModel)]="firstName" placeholder="John" class="input" />
        </div>
        <div class="flex-1">
          <label class="label">Last Name</label>
          <input type="text" [(ngModel)]="lastName" placeholder="Doe" class="input" />
        </div>
      </div>
      <div>
        <label class="label">Email</label>
        <input type="email" [(ngModel)]="email" placeholder="you@example.com" class="input" />
      </div>
      <button (click)="nextStep()" [disabled]="!step1Valid" class="btn-primary w-full mt-2">Continue</button>
    </div>

    <!-- Step 2 -->
    <div *ngIf="step === 2" class="space-y-4">
      <div>
        <label class="label">Password</label>
        <div class="relative">
          <input [type]="showPw ? 'text' : 'password'" [(ngModel)]="password" placeholder="Min. 8 characters" class="input pr-10" />
          <button type="button" (click)="showPw = !showPw" class="absolute right-3 top-1/2 -translate-y-1/2 text-ink-faint hover:text-ink transition">
            <i class="fa-solid" [ngClass]="showPw ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>
      <div>
        <label class="label">Confirm Password</label>
        <div class="relative">
          <input [type]="showPwC ? 'text' : 'password'" [(ngModel)]="passwordConfirm" placeholder="Repeat password" class="input pr-10"
            [ngClass]="passwordConfirm && !pwMatch ? 'input-error' : ''" />
          <button type="button" (click)="showPwC = !showPwC" class="absolute right-3 top-1/2 -translate-y-1/2 text-ink-faint hover:text-ink transition">
            <i class="fa-solid" [ngClass]="showPwC ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
        <p *ngIf="passwordConfirm && !pwMatch" class="text-xs text-red-400 mt-1">Passwords don't match</p>
      </div>
      <div class="flex gap-3 mt-2">
        <button (click)="prevStep()" class="btn-secondary flex-1">Back</button>
        <button (click)="register()" [disabled]="loading || !step2Valid" class="btn-primary flex-1">
          <i *ngIf="loading" class="fa-solid fa-spinner fa-spin"></i>
          {{ loading ? 'Creating...' : 'Create Account' }}
        </button>
      </div>
    </div>

    <p class="text-center text-sm text-ink-muted mt-5">
      Already have an account? <a routerLink="/login" class="text-brand hover:underline font-medium">Sign In</a>
    </p>
  </div>
</section>
