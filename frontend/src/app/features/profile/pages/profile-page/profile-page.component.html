<section class="app-panel mx-auto max-w-3xl p-6">
  <h1 class="m-0 text-3xl font-black">Profile</h1>
  <p class="mt-2 text-black/65">Manage your customer information used during checkout.</p>

  <form class="mt-6 space-y-4" [formGroup]="profileForm" (ngSubmit)="save()">
    <div class="grid gap-4 sm:grid-cols-2">
      <label>
        <span class="field-label">First name</span>
        <input class="text-field" formControlName="firstName" />
      </label>
      <label>
        <span class="field-label">Last name</span>
        <input class="text-field" formControlName="lastName" />
      </label>
    </div>

    <label>
      <span class="field-label">Email</span>
      <input class="text-field" formControlName="email" />
    </label>

    <div class="grid gap-4 sm:grid-cols-2">
      <label>
        <span class="field-label">Street</span>
        <input class="text-field" formControlName="street" />
      </label>
      <label>
        <span class="field-label">City</span>
        <input class="text-field" formControlName="city" />
      </label>
    </div>

    <div class="grid gap-4 sm:grid-cols-2">
      <label>
        <span class="field-label">House number</span>
        <input class="text-field" formControlName="houseNumber" />
      </label>
      <label>
        <span class="field-label">Zip code</span>
        <input class="text-field" formControlName="zipCode" />
      </label>
    </div>

    <p class="rounded-xl bg-red-100 px-3 py-2 text-sm font-semibold text-red-700" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>
    <p class="rounded-xl bg-green-100 px-3 py-2 text-sm font-semibold text-green-800" *ngIf="successMessage">
      {{ successMessage }}
    </p>

    <button type="submit" class="btn-primary" [disabled]="saving">
      {{ saving ? 'Saving...' : 'Save Profile' }}
    </button>
  </form>
</section>
