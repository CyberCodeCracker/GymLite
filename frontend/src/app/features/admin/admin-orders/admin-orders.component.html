<div>
  <h2 class="text-xl font-bold text-ink mb-6">Orders</h2>

  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-white/10 text-left text-ink-muted">
          <th class="pb-3 font-medium">ID</th>
          <th class="pb-3 font-medium">Reference</th>
          <th class="pb-3 font-medium">Amount</th>
          <th class="pb-3 font-medium hidden sm:table-cell">Payment</th>
          <th class="pb-3 font-medium hidden md:table-cell">Customer</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let o of paged" class="border-b border-white/5 hover:bg-white/[0.02]">
          <td class="py-3 text-ink-muted">#{{ o.id }}</td>
          <td class="py-3 font-medium text-ink">{{ o.reference }}</td>
          <td class="py-3 text-brand font-medium">{{ o.amount | currency }}</td>
          <td class="py-3 text-ink-muted hidden sm:table-cell">{{ formatMethod(o.paymentMethod) }}</td>
          <td class="py-3 text-ink-muted hidden md:table-cell font-mono text-xs">{{ o.customerId }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!orders.length" class="text-center py-12 text-ink-muted">
    <i class="fa-solid fa-receipt text-4xl mb-3"></i>
    <p>No orders yet</p>
  </div>

  <app-pagination [currentPage]="page" [totalItems]="orders.length" [pageSize]="pageSize" (pageChange)="page = $event"></app-pagination>
</div>
