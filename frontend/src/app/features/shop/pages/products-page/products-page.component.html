<section class="space-y-6">
  <header class="app-panel p-5">
    <div class="flex flex-wrap items-end justify-between gap-4">
      <div>
        <h1 class="m-0 text-3xl font-black tracking-tight">Products</h1>
        <p class="m-0 mt-1 text-black/65">Build your ideal gym setup with trusted equipment.</p>
      </div>

      <label class="block min-w-56">
        <span class="field-label">Filter by category</span>
        <select
          class="text-field"
          [ngModel]="selectedCategory"
          (ngModelChange)="onCategoryChange($event)"
        >
          <option *ngFor="let categoryName of categoryOptions" [ngValue]="categoryName">
            {{ categoryName === 'all' ? 'All categories' : categoryName }}
          </option>
        </select>
      </label>
    </div>

    <p class="mt-3 rounded-xl bg-green-100 px-3 py-2 text-sm font-semibold text-green-800" *ngIf="successMessage">
      {{ successMessage }}
    </p>
    <p class="mt-3 rounded-xl bg-red-100 px-3 py-2 text-sm font-semibold text-red-700" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>
  </header>

  <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 xl:grid-cols-3" *ngIf="!loading; else loadingTpl">
    <app-product-card
      *ngFor="let product of products"
      [product]="product"
      (addToCart)="addToCart($event)"
    ></app-product-card>
  </div>

  <ng-template #loadingTpl>
    <div class="app-panel p-6 text-center text-black/60">Loading products...</div>
  </ng-template>

  <div class="app-panel p-6 text-center text-black/60" *ngIf="!loading && products.length === 0">
    No products found for this category.
  </div>
</section>
