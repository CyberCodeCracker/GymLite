<article class="product-card">
  <div class="image-shell">
    <img
      [src]="product.imageUrls[0] || 'https://via.placeholder.com/480x320?text=GymLite+Product'"
      [alt]="product.name"
      loading="lazy"
    />
  </div>

  <div class="mt-4">
    <div class="mb-2 flex items-start justify-between gap-3">
      <h3 class="m-0 text-base font-bold leading-tight">{{ product.name }}</h3>
      <span class="rounded-full bg-brand/20 px-2 py-1 text-xs font-semibold text-ink">
        {{ product.categoryName }}
      </span>
    </div>
    <p class="m-0 min-h-[60px] text-sm text-black/65">{{ product.description }}</p>
    <p class="mt-3 text-lg font-black text-brand">{{ product.price | currency }}</p>
  </div>

  <div class="mt-4 flex items-center justify-between gap-3">
    <div class="inline-flex items-center gap-2">
      <button type="button" class="qty-btn" (click)="decreaseQuantity()">-</button>
      <span class="min-w-6 text-center text-sm font-semibold">{{ quantity }}</span>
      <button type="button" class="qty-btn" (click)="increaseQuantity()">+</button>
    </div>

    <button type="button" class="btn-primary" (click)="add()">Add To Cart</button>
  </div>
</article>
