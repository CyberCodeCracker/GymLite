<section class="container-app py-8">
  <h1 class="text-3xl font-black text-ink mb-6">Your Cart</h1>

  <ng-container *ngIf="cart$ | async as items">
    <!-- Empty -->
    <div *ngIf="!items.length" class="text-center py-20">
      <i class="fa-solid fa-cart-shopping text-5xl text-ink-faint mb-4"></i>
      <p class="text-ink-muted text-lg">Your cart is empty</p>
      <a routerLink="/products" class="btn-primary mt-6 inline-flex">Start Shopping</a>
    </div>

    <!-- Items -->
    <div *ngIf="items.length" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-4">
        <div *ngFor="let item of items" class="card flex flex-col sm:flex-row items-start sm:items-center gap-4">
          <div class="w-20 h-20 rounded-lg bg-surface-lighter overflow-hidden flex-shrink-0 flex items-center justify-center">
            <img *ngIf="item.imageUrl" [src]="item.imageUrl" [alt]="item.name" class="w-full h-full object-cover" />
            <i *ngIf="!item.imageUrl" class="fa-solid fa-dumbbell text-xl text-ink-faint"></i>
          </div>
          <div class="flex-1 min-w-0">
            <a [routerLink]="['/products', item.productId]" class="text-sm font-semibold text-ink hover:text-brand transition truncate block">{{ item.name }}</a>
            <p class="text-brand font-bold mt-1">{{ item.price | currency }}</p>
          </div>
          <div class="flex items-center gap-3">
            <div class="flex items-center border border-white/10 rounded-lg">
              <button (click)="updateQty(item.productId, item.quantity - 1)" class="px-2 py-1 text-ink-muted hover:text-ink">
                <i class="fa-solid fa-minus text-xs"></i>
              </button>
              <span class="w-8 text-center text-sm text-ink">{{ item.quantity }}</span>
              <button (click)="updateQty(item.productId, item.quantity + 1)" class="px-2 py-1 text-ink-muted hover:text-ink">
                <i class="fa-solid fa-plus text-xs"></i>
              </button>
            </div>
            <button (click)="remove(item.productId, item.name)" class="text-ink-faint hover:text-red-400 transition">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </div>
        </div>

        <button (click)="clear()" class="btn-ghost btn-sm text-red-400 hover:text-red-300">
          <i class="fa-solid fa-trash"></i> Clear Cart
        </button>
      </div>

      <!-- Summary -->
      <div class="card h-fit sticky top-24">
        <h2 class="text-lg font-bold text-ink mb-4">Order Summary</h2>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between text-ink-muted">
            <span>Items ({{ items.length }})</span>
            <span>{{ total$ | async | currency }}</span>
          </div>
          <div class="flex justify-between text-ink-muted">
            <span>Shipping</span>
            <span class="text-green-400">Free</span>
          </div>
          <hr class="border-white/10 my-3" />
          <div class="flex justify-between text-ink font-bold text-base">
            <span>Total</span>
            <span class="text-brand">{{ total$ | async | currency }}</span>
          </div>
        </div>
        <a routerLink="/checkout" class="btn-primary w-full mt-6">
          Proceed to Checkout <i class="fa-solid fa-arrow-right ml-1"></i>
        </a>
      </div>
    </div>
  </ng-container>
</section>
