<div class="overlay" *ngIf="open" (click)="close()"></div>
<aside class="cart-panel" [class.cart-panel--open]="open" aria-label="Shopping cart">
  <header class="flex items-center justify-between border-b border-black/10 px-5 py-4">
    <div>
      <h3 class="m-0 text-lg font-bold">Your Cart</h3>
      <p class="m-0 text-sm text-black/65" *ngIf="itemCount$ | async as count">
        {{ count }} item(s)
      </p>
    </div>
    <button type="button" class="btn-secondary !px-3" (click)="close()">Close</button>
  </header>

  <div class="max-h-[56vh] overflow-y-auto px-5 py-4" *ngIf="items$ | async as items">
    <div *ngIf="items.length === 0" class="rounded-xl border border-dashed border-black/20 p-4 text-sm text-black/60">
      Your cart is empty.
    </div>

    <article *ngFor="let item of items" class="mb-3 rounded-xl border border-black/10 bg-white p-3">
      <div class="flex items-start justify-between gap-2">
        <div>
          <h4 class="m-0 text-sm font-semibold">{{ item.product.name }}</h4>
          <p class="m-0 mt-1 text-xs text-black/60">{{ item.product.price | currency }}</p>
        </div>
        <button type="button" class="text-xs font-semibold text-red-700" (click)="remove(item.product.id)">Remove</button>
      </div>
      <div class="mt-3 flex items-center gap-3">
        <button type="button" class="qty-btn" (click)="decrease(item.product.id, item.quantity)">-</button>
        <span class="min-w-6 text-center text-sm font-semibold">{{ item.quantity }}</span>
        <button type="button" class="qty-btn" (click)="increase(item.product.id, item.quantity)">+</button>
      </div>
    </article>
  </div>

  <footer class="border-t border-black/10 px-5 py-4">
    <div class="mb-3 flex items-center justify-between text-sm font-semibold">
      <span>Total</span>
      <span>{{ (totalAmount$ | async) ?? 0 | currency }}</span>
    </div>

    <div class="flex gap-2">
      <button type="button" class="btn-secondary w-full" (click)="clear()">Clear</button>
      <button type="button" class="btn-primary w-full" (click)="goToCheckout()">Checkout</button>
    </div>
  </footer>
</aside>
